semantic_models:
  - name: offices
    defaults:
      agg_time_dimension: opened_date
    description: "Office dimension for Brand A"
    model: ref('dim_offices')

    entities:
      - name: office
        type: primary
        expr: office_id

    dimensions:
      - name: opened_date
        type: time
        expr: "date_trunc(opened_date, DAY)"
        type_params:
          time_granularity: day
      - name: city
        type: categorical
      - name: state
        type: categorical
      - name: region
        type: categorical
      - name: office_type
        type: categorical
      - name: is_active
        type: categorical
        expr: "cast(is_active as string)"

    measures:
      - name: total_offices
        agg: count
        expr: office_id
      - name: active_offices
        agg: count
        expr: office_id
        agg_params:
          where: "{{ Dimension('office__is_active') }} = 'true'"
