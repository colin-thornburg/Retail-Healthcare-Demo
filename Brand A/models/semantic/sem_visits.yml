semantic_models:
  - name: visits
    defaults:
      agg_time_dimension: visit_date
    description: |
      Visit-level fact data for Brand A. Each row represents a single
      patient visit including treatment details and billing.
    model: ref('fct_visits')

    entities:
      - name: visit
        type: primary
        expr: visit_id
      - name: patient
        type: foreign
        expr: patient_id
      - name: provider
        type: foreign
        expr: provider_id
      - name: office
        type: foreign
        expr: office_id

    dimensions:
      - name: visit_date
        type: time
        expr: "date_trunc(visit_date, DAY)"
        type_params:
          time_granularity: day
      - name: visit_type
        type: categorical
        description: "Type of dental visit (Cleaning, Exam, Filling, Crown, etc.)"
      - name: visit_status
        type: categorical
        description: "Status of the visit"
      - name: is_completed
        type: categorical
        expr: "cast(is_completed as string)"
      - name: treatment_accepted
        type: categorical
        expr: "cast(treatment_accepted as string)"
      - name: payment_status
        type: categorical

    measures:
      - name: total_visits
        description: "Count of all visits"
        agg: count
        expr: visit_id
      - name: completed_visits
        description: "Count of completed visits"
        agg: count
        expr: visit_id
        agg_params:
          where: "{{ Dimension('visit__is_completed') }} = 'true'"
      - name: total_charges
        description: "Total gross charges"
        agg: sum
        expr: charge_amount
      - name: total_insurance_collected
        description: "Total amount collected from insurance"
        agg: sum
        expr: insurance_paid
      - name: total_patient_collected
        description: "Total amount collected from patients"
        agg: sum
        expr: patient_paid
      - name: total_net_revenue
        description: "Total net revenue (insurance + patient payments)"
        agg: sum
        expr: net_revenue
      - name: avg_charge_per_visit
        description: "Average charge amount per visit"
        agg: average
        expr: charge_amount
      - name: treatments_accepted_count
        description: "Count of visits where treatment was accepted"
        agg: count
        expr: visit_id
        agg_params:
          where: "{{ Dimension('visit__treatment_accepted') }} = 'true'"
      - name: unique_patients
        description: "Count of distinct patients"
        agg: count_distinct
        expr: patient_id
