semantic_models:
  - name: daily_revenue
    defaults:
      agg_time_dimension: revenue_date
    description: |
      Daily revenue aggregated per office. Designed for FP&A reporting —
      primary metric surface for financial analysis.
    model: ref('fct_revenue')

    entities:
      - name: office_revenue
        type: primary
        expr: "concat(cast(office_id as string), '-', cast(revenue_date as string))"
      - name: office
        type: foreign
        expr: office_id

    dimensions:
      - name: revenue_date
        type: time
        expr: "date_trunc(revenue_date, DAY)"
        type_params:
          time_granularity: day
      - name: region
        type: categorical
      - name: state
        type: categorical

    measures:
      - name: gross_charges
        agg: sum
        expr: gross_charges
      - name: insurance_revenue
        agg: sum
        expr: insurance_collected
      - name: patient_revenue
        agg: sum
        expr: patient_collected
      - name: net_revenue
        agg: sum
        expr: net_revenue
      - name: total_visits_count
        agg: sum
        expr: total_visits
      - name: completed_visits_count
        agg: sum
        expr: completed_visits
