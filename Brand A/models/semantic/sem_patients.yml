semantic_models:
  - name: patients
    defaults:
      agg_time_dimension: patient_since
    description: "Patient dimension for Brand A"
    model: ref('dim_patients')

    entities:
      - name: patient
        type: primary
        expr: patient_id
      - name: office
        type: foreign
        expr: office_id

    dimensions:
      - name: patient_since
        type: time
        expr: "date_trunc(patient_since, DAY)"
        type_params:
          time_granularity: day
      - name: insurance_type
        type: categorical
      - name: gender
        type: categorical
      - name: age_group
        type: categorical
        expr: |
          case
            when age < 18 then 'Pediatric'
            when age between 18 and 34 then 'Young Adult'
            when age between 35 and 54 then 'Adult'
            when age between 55 and 64 then 'Senior'
            else 'Medicare Age'
          end
      - name: is_active
        type: categorical
        expr: "cast(is_active as string)"

    measures:
      - name: total_patients
        agg: count
        expr: patient_id
      - name: active_patients
        agg: count
        expr: patient_id
        agg_params:
          where: "{{ Dimension('patient__is_active') }} = 'true'"
      - name: avg_patient_tenure_months
        agg: average
        expr: tenure_months
