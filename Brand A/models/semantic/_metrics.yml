version: 2

metrics:
  - name: total_net_revenue
    description: "Alias metric wrapper for net revenue"
    type: derived
    expr: base_net_revenue
    input_metrics:
      - name: net_revenue
        alias: base_net_revenue

  - name: avg_revenue_per_visit
    description: "Average net revenue per completed visit"
    type: ratio
    numerator: net_revenue
    denominator: daily_completed_visits

  - name: cumulative_revenue
    description: "Running total of net revenue useful for FP&A trending"
    type: cumulative
    input_metric: net_revenue
    window: 1 month

  - name: revenue_mom_growth
    description: "Month-over-month revenue growth rate"
    type: derived
    expr: "safe_divide(current_revenue - prior_revenue, prior_revenue)"
    input_metrics:
      - name: net_revenue
        alias: current_revenue
      - name: net_revenue
        offset_window: 1 month
        alias: prior_revenue

  - name: visit_completion_rate
    description: "Percentage of visits that were completed"
    type: ratio
    numerator: completed_visits
    denominator: total_visits

  - name: treatment_acceptance_rate
    description: "Rate at which patients accept recommended treatments"
    type: ratio
    numerator: treatments_accepted
    denominator: total_visits
