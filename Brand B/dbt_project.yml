name: 'clearchoice'
version: '1.0.0'

require-dbt-version: [">={1.7.0}", "<2.0.0"]

profile: 'default'

model-paths: ["models"]
analysis-paths: ["analyses"]
test-paths: ["tests"]
seed-paths: ["seeds"]
macro-paths: ["macros"]
snapshot-paths: ["snapshots"]

clean-targets:
  - "target"
  - "dbt_packages"

# ============================================
# MODEL CONFIGURATIONS
# ============================================
models:
  clearchoice:
    staging:
      +materialized: view
      +schema: staging
      +tags: ['staging']

    intermediate:
      +materialized: view
      +schema: intermediate
      +tags: ['intermediate']

    marts:
      +materialized: table
      +schema: marts
      +tags: ['marts']
      +access: public
      +group: clearchoice

    semantic:
      +materialized: table
      +tags: [semantic]

    example:
      +materialized: table

# ============================================
# SEED CONFIGURATIONS
# ============================================
seeds:
  clearchoice:
    +schema: raw
    raw_billing:
      +column_types:
        charge_amount: NUMERIC
        insurance_paid: NUMERIC
        patient_paid: NUMERIC

# ============================================
# TEST CONFIGURATIONS
# ============================================
tests:
  +severity: warn

# ============================================
# VARS
# ============================================
vars:
  brand_name: 'ClearChoice'
  brand_code: 'CC'
