semantic_models:
  - name: monthly_revenue
    defaults:
      agg_time_dimension: revenue_month
    description: |
      Monthly revenue aggregated per clinic. Includes species mix and wellness plan metrics.
    model: ref('fct_revenue')

    entities:
      - name: clinic_revenue
        type: primary
        expr: "concat(cast(clinic_id as string), '-', cast(revenue_month as string))"
      - name: clinic
        type: foreign
        expr: clinic_id

    dimensions:
      - name: revenue_month
        type: time
        expr: "date_trunc(revenue_month, DAY)"
        type_params:
          time_granularity: month
      - name: region
        type: categorical

    measures:
      - name: gross_charges
        agg: sum
        expr: gross_charges
      - name: net_revenue
        agg: sum
        expr: total_owner_paid
      - name: total_visits_count
        agg: sum
        expr: total_visits
      - name: dog_visits_count
        agg: sum
        expr: dog_visits
      - name: cat_visits_count
        agg: sum
        expr: cat_visits
      - name: wellness_covered_sum
        agg: sum
        expr: total_wellness_covered
