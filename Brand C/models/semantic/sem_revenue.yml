semantic_models:
  - name: daily_revenue
    defaults:
      agg_time_dimension: revenue_date
    description: |
      Daily revenue aggregated per clinic, including payer mix.
    model: ref('fct_revenue')

    entities:
      - name: clinic_revenue
        type: primary
        expr: "concat(cast(clinic_id as string), '-', cast(revenue_date as string))"
      - name: clinic
        type: foreign
        expr: clinic_id

    dimensions:
      - name: revenue_date
        type: time
        expr: "date_trunc(revenue_date, DAY)"
        type_params:
          time_granularity: day
      - name: region
        type: categorical
      - name: state
        type: categorical

    measures:
      - name: gross_charges
        agg: sum
        expr: gross_charges
      - name: net_revenue
        agg: sum
        expr: net_revenue
      - name: total_visits_count
        agg: sum
        expr: total_visits
      - name: completed_visits_count
        agg: sum
        expr: completed_visits
      - name: self_pay_visits_count
        agg: sum
        expr: self_pay_visits
      - name: medicaid_visits_count
        agg: sum
        expr: medicaid_visits
